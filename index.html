    <!-- MAIN APP CONTENT -->

                <button onclick="logout()" class="text-white bg-red-500 hover:bg-red-600 px-4 py-2 rounded-xl font-bold text-sm shadow-md transition-colors flex items-center gap-2">

            </div>
            
            <!-- Tabs di Navigazione (Centrate) -->
            <div class="max-w-7xl mx-auto flex gap-3 mt-5">
                <button onclick="switchTab('dieta')" id="tab-dieta" class="tab-btn active flex-1 py-3 rounded-xl font-bold text-sm">Menù Dieta</button>
                <button onclick="switchTab('glicemia')" id="tab-glicemia" class="tab-btn inactive flex-1 py-3 rounded-xl font-bold text-sm">Glicemia</button>
            </div>
        </header>

        <!-- Contenitore Responsivo (Non è più bloccato a cellulare su PC) -->
        <main class="flex-1 w-full max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
            
            <!-- ===================== -->
            <!-- VISTA: DIETA AUTOMATICA -->
            <!-- ===================== -->
            <div id="view-dieta" class="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8">
                
                <!-- Colonna Form Dieta -->
                <div class="lg:col-span-2 space-y-6">
                    
                    <!-- Selettore Giorno Libero -->
                    <div class="relative bg-white rounded-2xl shadow-sm border border-slate-200">
                        <select id="giorno-select" onchange="loadDay()" class="w-full bg-transparent border-none rounded-2xl py-4 pl-5 pr-10 font-black text-slate-800 text-xl cursor-pointer outline-none">
                            <option value="Lunedì">Lunedì</option>
                            <option value="Martedì">Martedì</option>
                            <option value="Mercoledì">Mercoledì</option>
                            <option value="Giovedì">Giovedì</option>
                            <option value="Venerdì">Venerdì</option>
                            <option value="Sabato">Sabato</option>
                            <option value="Domenica">Domenica</option>
                        </select>
                    </div>

                    <!-- Area Input Pasti (Con Lucchetto) -->
                    <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-slate-200 space-y-5 relative">
                        
                        <!-- OVERLAY DI BLOCCO (LUCCHETTO) - Blocca solo i pasti, non i giorni! -->
                        <div id="lock-overlay" class="hidden absolute inset-0 bg-white/80 backdrop-blur-[3px] z-10 rounded-3xl flex flex-col items-center justify-center border-2 border-green-500 shadow-inner">
                            <div class="bg-green-50 p-5 rounded-full text-green-600 mb-3 shadow-md">
                                <i class="fa-solid fa-lock text-4xl"></i>
                            </div>
                            <span class="font-black text-slate-800 text-lg">Giornata Salvata</span>
                            <span class="text-slate-500 text-sm mb-4">I limiti sono stati calcolati.</span>
                            <button onclick="unlockDay()" class="text-sm bg-slate-800 hover:bg-slate-700 text-white px-5 py-2.5 rounded-full font-bold transition-colors shadow-lg">
                                <i class="fa-solid fa-pen-to-square mr-1"></i> Modifica
                            </button>
                        </div>

                        <!-- Colazione -->
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1"><i class="fa-solid fa-mug-saucer mr-1 text-slate-500"></i>Colazione</label>
                            <select id="colazione" class="w-full bg-slate-50 border-2 border-slate-200 text-slate-700 font-semibold rounded-xl px-4 py-3.5 focus:outline-none focus:border-green-500 transition-colors">
                                <option value="">Seleziona colazione...</option>
                                <option value="Yogurt Greco (150g) + 40g Fette biscottate" data-dairy="1">Yogurt Greco (150g) + 40g Fette biscottate</option>
                                <option value="Latte (200ml) + 40g Cereali integrali">Latte (200ml) + 40g Cereali integrali</option>
                                <option value="Ricotta vaccina (120g) + 40g Pane tostato" data-dairy="1">Ricotta vaccina (120g) + 40g Pane tostato</option>
                                <option value="Pane (40g) + Burro Arachidi (15g) + Latte (200ml)">Pane (40g) + Burro Arachidi (15g) + Latte</option>
                            </select>
                        </div>

                        <!-- Spuntino 1 -->
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1"><i class="fa-solid fa-apple-whole mr-1 text-slate-500"></i>Spuntino Mattina</label>
                            <select id="spuntino1" class="w-full bg-slate-50 border-2 border-slate-200 text-slate-700 font-semibold rounded-xl px-4 py-3.5 focus:outline-none focus:border-green-500 transition-colors">
                                <option value="Frutta (150g) + Crackers/Grissini (30g)">Frutta (150g) + Crackers/Grissini (30g)</option>
                            </select>
                        </div>

                        <!-- Pranzo -->
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1"><i class="fa-solid fa-sun mr-1 text-slate-500"></i>Pranzo (Include 80g Carboidrati)</label>
                            <select id="pranzo" class="w-full bg-slate-50 border-2 border-slate-200 text-slate-700 font-semibold rounded-xl px-4 py-3.5 focus:outline-none focus:border-green-500 transition-colors">
                                <option value="">Seleziona pranzo...</option>
                                <option value="Crema di zucchine + Fesa di Tacchino (150g)">Crema di zucchine + Fesa di Tacchino (150g)</option>
                                <option value="Risotto ai carciofi + Seppie/Calamari (180g)">Risotto ai carciofi + Seppie/Calamari (180g)</option>
                                <option value="Risotto al Gorgonzola (80g) e Radicchio" data-dairy="1">Risotto al Gorgonzola (80g) e Radicchio</option>
                                <option value="Crema di zucca + Ceci/Lenticchie (150g)">Crema di zucca + Ceci/Lenticchie (150g)</option>
                                <option value="Pasta pomodorini e melanzane + Pesce azzurro (180g)">Pasta pomodorini e melanzane + Pesce azzurro (180g)</option>
                                <option value="Risotto ai funghi + Petto di Pollo (150g)">Risotto ai funghi + Petto di Pollo (150g)</option>
                            </select>
                        </div>

                        <!-- Spuntino 2 -->
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1"><i class="fa-regular fa-clock mr-1 text-slate-500"></i>Spuntino Pomeriggio</label>
                            <select id="spuntino2" class="w-full bg-slate-50 border-2 border-slate-200 text-slate-700 font-semibold rounded-xl px-4 py-3.5 focus:outline-none focus:border-green-500 transition-colors">
                                <option value="">Seleziona spuntino...</option>
                                <option value="Frutta Secca (15g)">Frutta Secca (15g)</option>
                                <option value="Yogurt Greco (150g)" data-dairy="1">Yogurt Greco (150g)</option>
                                <option value="Crackers (30g)">Crackers (30g)</option>
                                <option value="Solo Frutta (Per bilanciare grassi)">Solo Frutta (Se mangiato burro arachidi mattino)</option>
                            </select>
                        </div>

                        <!-- Cena -->
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1"><i class="fa-solid fa-moon mr-1 text-slate-500"></i>Cena (Include 100g Pane)</label>
                            <select id="cena" class="w-full bg-slate-50 border-2 border-slate-200 text-slate-700 font-semibold rounded-xl px-4 py-3.5 focus:outline-none focus:border-green-500 transition-colors">
                                <option value="">Seleziona cena...</option>
                                <option value="2 Uova (Sode o frittata al forno)" data-egg="1">2 Uova (Sode o frittata al forno)</option>
                                <option value="Bresaola o Crudo sgrassato (120g)">Bresaola o Crudo sgrassato (120g)</option>
                                <option value="Spezzatino di Coniglio (150g)">Spezzatino di Coniglio (150g)</option>
                                <option value="Tagliata di Bovino (150g)" data-redmeat="1">Tagliata di Bovino (150g)</option>
                                <option value="Pizza Integrale Verdure e Mozzarella" data-dairy="1">Pizza Integrale Verdure e Mozzarella</option>
                                <option value="Straccetti di Tacchino (150g)">Straccetti di Tacchino (150g)</option>
                            </select>
                        </div>
                        
                        <div class="pt-4">
                            <button onclick="salvaDieta()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-green-600/30 transition-all flex justify-center items-center gap-2 text-lg">
                                <i class="fa-solid fa-floppy-disk"></i> Salva Giornata
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Colonna Destra: Budget e Diario Dieta -->
                <div class="space-y-6">
                    
                    <!-- Budget Settimanale -->
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                        <h3 class="text-lg font-black text-slate-800 mb-5 border-b border-slate-100 pb-3 flex items-center gap-2"><i class="fa-solid fa-scale-balanced text-green-600"></i> Limiti Settimanali</h3>
                        <div class="space-y-5">
                            <div>
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="font-bold text-slate-600"><i class="fa-solid fa-egg text-amber-500 mr-1"></i> Uova</span>
                                    <span id="egg-count" class="font-black text-slate-800">0 / 1</span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-3">
                                    <div id="egg-bar" class="bg-amber-500 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="font-bold text-slate-600"><i class="fa-solid fa-cheese text-yellow-500 mr-1"></i> Formaggi/Pizza</span>
                                    <span id="dairy-count" class="font-black text-slate-800">0 / 3</span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-3">
                                    <div id="dairy-bar" class="bg-yellow-500 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="font-bold text-slate-600"><i class="fa-solid fa-drumstick-bite text-red-500 mr-1"></i> Carne Rossa</span>
                                    <span id="meat-count" class="font-black text-slate-800">0 / 1</span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-3">
                                    <div id="meat-bar" class="bg-red-500 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                        <button onclick="resetSettimana()" class="w-full mt-6 text-sm text-red-500 font-bold hover:text-red-700 transition-colors border border-red-200 rounded-lg py-2">
                            <i class="fa-solid fa-trash-can mr-1"></i> Svuota Settimana
                        </button>
                    </div>

                    <!-- Diario Settimana -->
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col h-[400px]">
                        <h3 class="text-lg font-black text-slate-800 mb-4 border-b border-slate-100 pb-3 flex items-center gap-2"><i class="fa-solid fa-book-open text-blue-500"></i> Il tuo Menù</h3>
                        <div id="diario-lista" class="flex-grow overflow-y-auto custom-scrollbar space-y-3 pr-2">
                            <div class="text-center text-slate-400 mt-10 text-sm font-medium">Nessuna giornata salvata.</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===================== -->
            <!-- VISTA: GLICEMIA -->
            <!-- ===================== -->
            <div id="view-glicemia" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8 max-w-4xl mx-auto">
                
                <!-- Form Glicemia -->
                <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-slate-200">
                    <h2 class="text-2xl font-black text-slate-800 mb-6 border-b border-slate-100 pb-3"><i class="fa-solid fa-droplet text-blue-500 mr-2"></i>Nuova Misurazione</h2>
                    
                    <div class="mb-5">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Valore (mg/dL)</label>
                        <input type="number" id="valore-glicemia" placeholder="Es. 110" class="w-full bg-slate-50 border-2 border-slate-200 text-slate-800 font-black text-3xl text-center rounded-2xl px-4 py-5 focus:outline-none focus:border-blue-500 transition-colors">
                    </div>
                    
                    <div class="mb-8 relative">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Fase (Calcolo Limite)</label>
                        <select id="tipo-glicemia" class="w-full bg-slate-50 border-2 border-slate-200 text-slate-700 font-bold rounded-xl px-4 py-4 cursor-pointer outline-none focus:border-blue-500 transition-colors">
                            <option value="digiuno">A Digiuno (Limite 150)</option>
                            <option value="post">Post-prandiale (Limite 180)</option>
                        </select>
                    </div>
                    
                    <button onclick="saveGlicemia()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-600/30 transition-all flex justify-center items-center gap-2 text-lg">
                        <i class="fa-solid fa-plus"></i> Registra Valore
                    </button>
                </div>

                <!-- Lista Glicemia -->
                <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col">
                    <h3 class="text-lg font-black text-slate-800 mb-4 border-b border-slate-100 pb-3 flex justify-between items-center">
                        <span><i class="fa-solid fa-clock-rotate-left text-slate-400 mr-2"></i>Cronologia</span>
                        <button onclick="clearGlicemia()" class="text-xs text-red-500 font-bold hover:underline">Svuota</button>
                    </h3>
                    <div id="lista-glicemia" class="flex-grow overflow-y-auto custom-scrollbar space-y-3 pr-2 h-[400px]">
                        <!-- Popolato via JS -->
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Modale Avvisi -->
    <div id="custom-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 transition-opacity">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-8 text-center">
            <div id="modal-icon" class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-amber-50 mb-5">
                <i class="fa-solid fa-triangle-exclamation text-4xl text-amber-500"></i>
            </div>
            <h3 id="modal-title" class="text-2xl font-black text-slate-800 mb-3">Attenzione</h3>
            <p id="modal-message" class="text-slate-600 font-medium mb-8 leading-relaxed"></p>
            <button onclick="closeModal()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-xl transition-colors">
                Ho capito
            </button>
        </div>
    </div>

    <script>
        // --- LOGICA DI BASE E SICUREZZA ---
        function checkPin() { 
            if(document.getElementById('pin-input').value === '713') { 
                document.getElementById('login-screen').classList.add('hidden'); 
                document.getElementById('app-content').classList.remove('hidden'); 
            } else { 
                alert('PIN Errato.'); 
                document.getElementById('pin-input').value = '';
            } 
        }

        function logout() { location.reload(); }
        
        function switchTab(t) { 
            document.getElementById('view-dieta').classList.toggle('hidden', t !== 'dieta');
            document.getElementById('view-glicemia').classList.toggle('hidden', t !== 'glicemia');
            
            document.getElementById('tab-dieta').className = `tab-btn flex-1 py-3 rounded-xl font-bold text-sm ${t==='dieta'?'active':'inactive'}`;
            document.getElementById('tab-glicemia').className = `tab-btn flex-1 py-3 rounded-xl font-bold text-sm ${t==='glicemia'?'active':'inactive'}`;
        }

        function showModal(title, message, isSuccess = false) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            
            const iconContainer = document.getElementById('modal-icon');
            if (isSuccess) {
                iconContainer.className = "mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-green-50 mb-5";
                iconContainer.innerHTML = '<i class="fa-solid fa-check text-4xl text-green-500"></i>';
                document.querySelector('#custom-modal button').textContent = "Ottimo!";
            } else {
                iconContainer.className = "mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-amber-50 mb-5";
                iconContainer.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-4xl text-amber-500"></i>';
                document.querySelector('#custom-modal button').textContent = "Ho capito";
            }
            document.getElementById('custom-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('custom-modal').classList.add('hidden'); }

        // --- STATO APPLICAZIONE (MEMORIA LOCALE) ---
        let appState = {
            dieta: {}, // { "Lunedì": { colazione: "...", spuntino1: "...", ... }, "Martedì": ... }
            budget: { uova: 0, latticini: 0, carneRossa: 0 },
            glicemia: [] // [ { val: 110, tipo: "digiuno", date: "..." }, ... ]
        };

        // Carica al primo avvio
        const stored = localStorage.getItem('smartfdiet_data_v2');
        if(stored) {
            appState = JSON.parse(stored);
            // Assicurati che le chiavi esistano se è un vecchio salvataggio
            if(!appState.dieta) appState.dieta = {};
            if(!appState.budget) appState.budget = { uova: 0, latticini: 0, carneRossa: 0 };
            if(!appState.glicemia) appState.glicemia = [];
        }

        function saveStateToStorage() {
            localStorage.setItem('smartfdiet_data_v2', JSON.stringify(appState));
        }

        // --- LOGICA DIETA (IL MOTORE CHEF) ---
        function salvaDieta() {
            const day = document.getElementById('giorno-select').value;
            const col = document.getElementById('colazione');
            const sp1 = document.getElementById('spuntino1');
            const pra = document.getElementById('pranzo');
            const sp2 = document.getElementById('spuntino2');
            const cen = document.getElementById('cena');

            if (!col.value || !pra.value || !sp2.value || !cen.value) {
                showModal("Campi Incompleti", "Chef, seleziona tutti i pasti dai menu a tendina prima di salvare.");
                return;
            }

            // Calcolo budget temporaneo per questa giornata
            let tempEggs = 0, tempDairy = 0, tempRedMeat = 0;
            [col, pra, cen, sp2].forEach(s => {
                const opt = s.options[s.selectedIndex];
                if (opt.dataset.egg) tempEggs += parseInt(opt.dataset.egg);
                if (opt.dataset.dairy) tempDairy += parseInt(opt.dataset.dairy);
                if (opt.dataset.redmeat) tempRedMeat += parseInt(opt.dataset.redmeat);
            });

            // Verifica sforamenti
            if (appState.budget.uova + tempEggs > 1) { showModal("Limite Uova!", "Hai già esaurito le uova settimanali."); return; }
            if (appState.budget.latticini + tempDairy > 3) { showModal("Troppi Formaggi!", "Superi il tetto dei formaggi/pizza."); return; }
            if (appState.budget.carneRossa + tempRedMeat > 1) { showModal("Attenzione!", "Carne rossa già inserita questa settimana."); return; }

            // Salva nel database locale
            appState.dieta[day] = {
                col: col.value, sp1: sp1.value, pra: pra.value, sp2: sp2.value, cen: cen.value,
                costs: { uova: tempEggs, latticini: tempDairy, carneRossa: tempRedMeat }
            };
            
            ricalcolaBudget();
            saveStateToStorage();
            
            // Avanza giorno
            const sel = document.getElementById('giorno-select');
            if(sel.selectedIndex < sel.options.length - 1) sel.selectedIndex++;
            
            loadDay(); // Aggiorna grafica
            aggiornaDiarioUI();
        }

        function loadDay() {
            const day = document.getElementById('giorno-select').value;
            const data = appState.dieta[day];
            
            const overlay = document.getElementById('lock-overlay');
            const col = document.getElementById('colazione');
            const sp1 = document.getElementById('spuntino1');
            const pra = document.getElementById('pranzo');
            const sp2 = document.getElementById('spuntino2');
            const cen = document.getElementById('cena');

            if(data) {
                // Trovato: blocca input (il select giorno resta fuori dal div con class relative che contiene l'overlay)
                col.value = data.col; sp1.value = data.sp1; pra.value = data.pra; sp2.value = data.sp2; cen.value = data.cen;
                overlay.classList.remove('hidden');
            } else {
                // Vuoto
                col.value = ''; sp1.value = 'Frutta (150g) + Crackers/Grissini (30g)'; pra.value = ''; sp2.value = ''; cen.value = '';
                overlay.classList.add('hidden');
            }
        }

        function unlockDay() {
            const day = document.getElementById('giorno-select').value;
            if(confirm(`Vuoi cancellare il menu di ${day} e rifarlo?`)) {
                delete appState.dieta[day];
                ricalcolaBudget();
                saveStateToStorage();
                loadDay();
                aggiornaDiarioUI();
            }
        }

        function ricalcolaBudget() {
            appState.budget = { uova: 0, latticini: 0, carneRossa: 0 };
            for(let day in appState.dieta) {
                appState.budget.uova += appState.dieta[day].costs.uova;
                appState.budget.latticini += appState.dieta[day].costs.latticini;
                appState.budget.carneRossa += appState.dieta[day].costs.carneRossa;
            }
            aggiornaBudgetUI();
        }

        function aggiornaBudgetUI() {
            document.getElementById('egg-count').innerText = `${appState.budget.uova} / 1`;
            document.getElementById('dairy-count').innerText = `${appState.budget.latticini} / 3`;
            document.getElementById('meat-count').innerText = `${appState.budget.carneRossa} / 1`;

            document.getElementById('egg-bar').style.width = `${(appState.budget.uova / 1) * 100}%`;
            document.getElementById('dairy-bar').style.width = `${(appState.budget.latticini / 3) * 100}%`;
            document.getElementById('meat-bar').style.width = `${(appState.budget.carneRossa / 1) * 100}%`;
        }

        function aggiornaDiarioUI() {
            const list = document.getElementById('diario-lista');
            list.innerHTML = '';
            
            const daysOrder = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
            let count = 0;

            daysOrder.forEach(day => {
                if(appState.dieta[day]) {
                    count++;
                    const d = appState.dieta[day];
                    const card = document.createElement('div');
                    card.className = "bg-slate-50 border border-slate-200 rounded-2xl p-4";
                    card.innerHTML = `
                        <div class="font-black text-slate-800 border-b border-slate-200 pb-2 mb-2 flex justify-between">
                            ${day} <button onclick="document.getElementById('giorno-select').value='${day}'; loadDay();" class="text-blue-500 text-xs font-bold uppercase"><i class="fa-solid fa-eye"></i> Apri</button>
                        </div>
                        <div class="text-sm font-medium text-slate-600 line-clamp-1 mb-1"><i class="fa-solid fa-utensils text-slate-400 w-4"></i> ${d.pra}</div>
                        <div class="text-sm font-medium text-slate-600 line-clamp-1"><i class="fa-solid fa-moon text-slate-400 w-4"></i> ${d.cen}</div>
                    `;
                    list.appendChild(card);
                }
            });

            if(count === 0) list.innerHTML = '<div class="text-center text-slate-400 mt-10 text-sm font-medium">Nessuna giornata salvata.</div>';
        }

        function resetSettimana() {
            if(confirm('Attenzione: stai per svuotare completamente la dieta settimanale. Vuoi procedere?')) {
                appState.dieta = {};
                ricalcolaBudget();
                saveStateToStorage();
                loadDay();
                aggiornaDiarioUI();
            }
        }

        // --- LOGICA GLICEMIA ---
        function saveGlicemia() {
            const val = parseInt(document.getElementById('valore-glicemia').value);
            const tipo = document.getElementById('tipo-glicemia').value;
            
            if(isNaN(val) || val <= 0) return;

            const now = new Date();
            const dateStr = now.toLocaleDateString('it-IT') + ' ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');

            appState.glicemia.unshift({ val: val, tipo: tipo, data: dateStr });
            if(appState.glicemia.length > 50) appState.glicemia.pop(); // Tieni massimo le ultime 50

            saveStateToStorage();
            document.getElementById('valore-glicemia').value = '';
            renderGlicemia();
        }

        function renderGlicemia() {
            const list = document.getElementById('lista-glicemia');
            list.innerHTML = '';

            if(appState.glicemia.length === 0) {
                list.innerHTML = '<div class="text-center text-slate-400 mt-10 text-sm font-medium">Nessuna misurazione salvata.</div>';
                return;
            }

            appState.glicemia.forEach(g => {
                const limit = g.tipo === 'digiuno' ? 150 : 180;
                const isGood = g.val <= limit;
                
                const bgColor = isGood ? 'bg-[#f0fdf4] border-[#bbf7d0]' : 'bg-red-50 border-red-200';
                const iconColor = isGood ? 'text-[#16a34a]' : 'text-red-500';
                const icon = isGood ? 'fa-check-circle' : 'fa-triangle-exclamation';
                const label = g.tipo === 'digiuno' ? 'A Digiuno' : 'Post-prandiale';

                const item = document.createElement('div');
                item.className = `p-4 border-2 rounded-2xl flex justify-between items-center shadow-sm ${bgColor}`;
                item.innerHTML = `
                    <div>
                        <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">${label} &bull; ${g.data}</div>
                        <div class="font-black text-3xl text-slate-800">${g.val} <span class="text-sm font-bold text-slate-500">mg/dL</span></div>
                    </div>
                    <i class="fa-solid ${icon} text-4xl ${iconColor} opacity-90"></i>
                `;
                list.appendChild(item);
            });
        }

        function clearGlicemia() {
            if(confirm('Vuoi davvero cancellare tutto lo storico della glicemia?')) {
                appState.glicemia = [];
                saveStateToStorage();
                renderGlicemia();
            }
        }

        // --- INIZIALIZZAZIONE ---
        window.onload = function() {
            ricalcolaBudget();
            aggiornaDiarioUI();
            loadDay();
            renderGlicemia();
        };

    </script>
</body>
</html>
