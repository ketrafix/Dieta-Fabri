            <!-- Area Contenuti Scorrevole -->
            <main class="flex-1 overflow-y-auto p-5 space-y-6 pb-12">
                
                <!-- VISTA DIETA -->
                <div id="view-dieta" class="space-y-5">
                    <!-- Selettore Giorni Libero (Non viene bloccato dal lucchetto) -->
                    <div class="relative">
                        <select id="giorno-select" onchange="loadDay()" class="custom-input font-bold text-slate-800 shadow-sm text-lg cursor-pointer appearance-none">

                            <option value="Martedì">Martedì</option>
                            <option value="Mercoledì">Mercoledì</option>
                            <option value="Giovedì">Giovedì</option>
                            <option value="Venerdì">Venerdì</option>
                            <option value="Sabato">Sabato</option>
                            <option value="Domenica">Domenica</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                    </div>

                    <!-- Area Input Dieta -->
                    <div id="form-dieta" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4 relative">
                        
                        <!-- OVERLAY DI BLOCCO (LUCCHETTO) - Appare solo sopra i pasti quando la giornata è completata -->
                        <div id="lock-overlay" class="hidden absolute inset-0 bg-slate-50/80 backdrop-blur-[2px] z-10 rounded-2xl flex flex-col items-center justify-center border-2 border-green-500">
                            <div class="bg-white p-4 rounded-full shadow-lg text-green-500 mb-2">
                                <i class="fa-solid fa-lock text-3xl"></i>
                            </div>
                            <span class="font-bold text-slate-700 text-sm">Giornata Completata</span>
                            <button onclick="unlockDay()" class="mt-3 text-xs bg-slate-200 hover:bg-slate-300 text-slate-600 px-3 py-1 rounded-full font-bold transition-colors">
                                Sblocca / Modifica
                            </button>
                        </div>

                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 ml-1"><i class="fa-solid fa-utensils mr-1"></i>Pranzo</label>
                            <input type="text" id="pranzo" placeholder="Es. Pasta e Tacchino..." class="custom-input font-medium">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 ml-1"><i class="fa-solid fa-moon mr-1"></i>Cena</label>

                        </div>
                        
                        <div class="pt-2">
                            <button onclick="saveDieta()" id="btn-save-dieta" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-md transition-colors flex justify-center items-center gap-2">

    <script>
        // Logica di Login Sicuro
        function checkPin() { 
            if(document.getElementById('pin-input').value === '713') { 
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').classList.add('hidden'); 
                    document.getElementById('app-content').classList.remove('hidden'); 
                }, 300);
            } else { 
                alert('Codice PIN Errato.'); 
                document.getElementById('pin-input').value = '';
            } 
        }

        function logout() { location.reload(); }
        
        // Navigazione tra Tabs (Dieta / Glicemia)
        function switchTab(t) { 
            document.getElementById('view-dieta').classList.toggle('hidden', t !== 'dieta');
            document.getElementById('view-glicemia').classList.toggle('hidden', t !== 'glicemia');
            
            document.getElementById('tab-dieta').className = `tab-btn flex-1 py-3.5 rounded-xl font-bold text-sm ${t==='dieta'?'active':'inactive'}`;
            document.getElementById('tab-glicemia').className = `tab-btn flex-1 py-3.5 rounded-xl font-bold text-sm ${t==='glicemia'?'active':'inactive'}`;
        }
        
        // ==========================
        // GESTIONE DIETA E LUCCHETTO
        // ==========================
        function saveDieta() {
            const day = document.getElementById('giorno-select').value;
            const c = document.getElementById('colazione').value;
            const p = document.getElementById('pranzo').value;
            const c2 = document.getElementById('cena').value;

            if(!c || !p || !c2) {
                alert('Compila colazione, pranzo e cena prima di salvare.');
                return;
            }

            localStorage.setItem('dieta_'+day, JSON.stringify({c: c, p: p, c2: c2}));
            
            // Auto-avanzamento al giorno successivo
            const select = document.getElementById('giorno-select');
            if(select.selectedIndex < select.options.length - 1) {
                select.selectedIndex += 1;
            }
            
            loadDay(); // Applica subito lo stato (libero o bloccato) del nuovo giorno
        }

        function loadDay() {
            const day = document.getElementById('giorno-select').value;
            const data = JSON.parse(localStorage.getItem('dieta_'+day));
            
            const overlay = document.getElementById('lock-overlay');
            const colazione = document.getElementById('colazione');
            const pranzo = document.getElementById('pranzo');
            const cena = document.getElementById('cena');

            if(data) {
                // Se i dati esistono, riempi i campi e BLOCCA TUTTO con l'overlay
                colazione.value = data.c;
                pranzo.value = data.p;
                cena.value = data.c2;
                overlay.classList.remove('hidden');
            } else {
                // Se non esistono, SVUOTA i campi e SBLOCCA
                colazione.value = '';
                pranzo.value = '';
                cena.value = '';
                overlay.classList.add('hidden');
            }
        }

        function unlockDay() {
            const day = document.getElementById('giorno-select').value;
            if(confirm('Vuoi sbloccare e modificare i dati di ' + day + '?')) {
                localStorage.removeItem('dieta_'+day); // Cancella i dati vecchi
                loadDay(); // Ricarica (essendo vuoto, toglierà il lucchetto)
            }
        }

        // ==========================
        // GESTIONE GLICEMIA
        // ==========================
        function saveGlicemia() {
            const val = document.getElementById('valore-glicemia').value;
            const tipo = document.getElementById('tipo-glicemia').value;
            
            if(!val) return;

            const limit = tipo === 'digiuno' ? 150 : 180;
            const isGood = val <= limit;
            
            // Colori in base al superamento del limite
            const bgColor = isGood ? 'bg-green-100 border-green-200 text-green-800' : 'bg-red-100 border-red-200 text-red-800';
            const iconColor = isGood ? 'text-green-600' : 'text-red-600';
            const icon = isGood ? 'fa-check-circle' : 'fa-triangle-exclamation';
            const label = tipo === 'digiuno' ? 'A Digiuno' : 'Post-prandiale';
            
            const list = document.getElementById('lista-glicemia');
            const item = document.createElement('div');
            
            item.className = `p-4 border-2 rounded-2xl flex justify-between items-center shadow-sm ${bgColor}`;
            item.innerHTML = `
                <div>
                    <div class="text-xs font-bold uppercase tracking-wider opacity-70 mb-1">${label}</div>
                    <div class="font-black text-2xl">${val} <span class="text-sm font-medium opacity-70">mg/dL</span></div>
                </div>
                <i class="fa-solid ${icon} text-3xl ${iconColor} opacity-80"></i>
            `;
            
            list.prepend(item);
            document.getElementById('valore-glicemia').value = ''; // Reset
        }
        
        // Inizializzazione al caricamento
        loadDay();
    </script>
</body>
</html>
