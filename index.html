<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFDiet - Diario Glicemico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        medical: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9', // Azzurro medico
                            600: '#0284c7',
                            800: '#075985',
                            900: '#0c4a6e', // Blu scuro affidabilità
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 1); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01); border: 1px solid rgba(226, 232, 240, 0.8); }
        .medical-gradient { background: linear-gradient(135deg, #0f172a 0%, #0c4a6e 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        select, input { appearance: none; }
        
        /* Animazioni */
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-4 transition-opacity duration-500">
        <div class="w-full max-w-sm glass-card rounded-[2rem] p-8 text-center shadow-2xl fade-in">
            <div class="mx-auto w-20 h-20 bg-medical-50 text-medical-600 rounded-2xl flex items-center justify-center text-4xl mb-6 shadow-sm border border-medical-100">
                <i class="fa-solid fa-droplet"></i>
            </div>
            
            <h1 class="text-3xl font-black text-slate-800 mb-2">SmartFDiet</h1>
            <p class="text-sm text-slate-500 font-medium mb-8">Diario Glicemico Personale</p>

            <div class="space-y-4">
                <input type="password" id="pin-input" placeholder="Codice PIN" inputmode="numeric" pattern="[0-9]*" class="w-full bg-slate-50 border-2 border-slate-200 text-slate-800 rounded-xl px-5 py-4 text-center text-2xl font-bold tracking-[0.5em] focus:outline-none focus:border-medical-500 transition-colors placeholder:tracking-normal placeholder:text-lg">
                <button onclick="checkPin()" class="w-full medical-gradient hover:opacity-90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-medical-900/20 text-lg flex justify-center items-center gap-2">
                    <i class="fa-solid fa-unlock-keyhole"></i> Accedi
                </button>
            </div>
            <p id="pin-error" class="text-red-500 text-sm font-bold mt-4 hidden"><i class="fa-solid fa-circle-exclamation mr-1"></i> PIN Errato</p>
        </div>
    </div>

    <div id="app-content" class="hidden flex-col min-h-screen">
        
        <header class="medical-gradient text-white shadow-md sticky top-0 z-40">
            <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-droplet text-medical-100 text-xl"></i>
                    <h1 class="text-xl font-bold tracking-tight">SmartFDiet</h1>
                </div>
                <button onclick="logout()" class="text-medical-100 hover:text-white transition-colors bg-white/10 px-3 py-1.5 rounded-lg text-sm font-medium">
                    <i class="fa-solid fa-arrow-right-from-bracket mr-1"></i> Esci
                </button>
            </div>
        </header>

        <main class="max-w-3xl mx-auto w-full px-4 mt-6 flex-grow flex flex-col gap-6 pb-12">
            
            <!-- Pannello Inserimento -->
            <div class="glass-card rounded-3xl p-6 fade-in">
                <h2 class="text-xl font-black text-slate-800 mb-5 flex items-center gap-2">
                    <i class="fa-solid fa-pen-to-square text-medical-600"></i> Registra Misurazione
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Momento della giornata</label>
                        <div class="relative">
                            <select id="glicemia-tipo" class="w-full bg-slate-50 border border-slate-200 text-slate-800 font-semibold rounded-xl px-4 py-3 focus:ring-2 focus:ring-medical-500 outline-none appearance-none">
                                <option value="digiuno">A Digiuno (Limite < 150)</option>
                                <option value="post">Post-Prandiale (Limite < 180)</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Valore Rilevato (mg/dL)</label>
                        <input type="number" id="glicemia-valore" placeholder="Es. 105" inputmode="numeric" class="w-full bg-slate-50 border border-slate-200 text-slate-800 font-bold rounded-xl px-4 py-3 focus:ring-2 focus:ring-medical-500 outline-none text-2xl text-center">
                    </div>

                    <button onclick="salvaGlicemia()" class="w-full bg-medical-600 hover:bg-medical-700 text-white font-bold py-4 rounded-xl transition-colors shadow-md text-lg mt-2 flex justify-center items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Salva nel Diario
                    </button>
                </div>
            </div>

            <!-- Diario Glicemico -->
            <div class="glass-card rounded-3xl p-6 flex flex-col flex-grow fade-in" style="animation-delay: 0.1s;">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-xl font-black text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-book-medical text-medical-600"></i> Storico
                    </h2>
                    <button onclick="svuotaDiario()" class="text-xs font-bold text-red-500 hover:text-red-700 bg-red-50 px-3 py-1.5 rounded-lg transition-colors">
                        <i class="fa-solid fa-trash mr-1"></i> Svuota
                    </button>
                </div>

                <div id="lista-glicemia" class="flex-grow overflow-y-auto custom-scrollbar space-y-3 pr-2 min-h-[300px]">
                    <!-- I dati verranno inseriti qui dal Javascript -->
                </div>
            </div>

        </main>
    </div>

    <div id="custom-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity opacity-0">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-6 text-center transform transition-all scale-95" id="modal-content">
            <div id="modal-icon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-medical-50 mb-4 text-3xl">
                <!-- Icona dinamica -->
            </div>
            <h3 id="modal-title" class="text-xl font-black text-slate-900 mb-2"></h3>
            <p id="modal-message" class="text-slate-600 font-medium text-sm mb-6 leading-relaxed"></p>
            <div id="modal-actions" class="flex gap-3">
                <button id="modal-btn-primary" class="flex-1 medical-gradient text-white font-bold py-3 rounded-xl shadow-md">Ok</button>
            </div>
        </div>
    </div>

    <script>
        const SECRET_CODE = "713";
        let misurazioni = [];

        // --- SISTEMA DI LOGIN ---
        function checkPin() {
            const input = document.getElementById('pin-input').value;
            const errorMsg = document.getElementById('pin-error');
            
            if (input === SECRET_CODE) {
                errorMsg.classList.add('hidden');
                document.getElementById('login-screen').classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-content').classList.remove('hidden');
                    document.getElementById('app-content').classList.add('flex');
                    loadData();
                }, 500);
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('pin-input').value = '';
                // Scuote l'input
                const inputEl = document.getElementById('pin-input');
                inputEl.classList.add('translate-x-2');
                setTimeout(() => inputEl.classList.remove('translate-x-2'), 100);
            }
        }

        function logout() {
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('app-content').classList.remove('flex');
            
            const loginScreen = document.getElementById('login-screen');
            loginScreen.classList.remove('hidden');
            document.getElementById('pin-input').value = '';
            
            setTimeout(() => {
                loginScreen.classList.remove('opacity-0', 'pointer-events-none');
            }, 50);
        }

        // --- GESTIONE DATI LOCALI ---
        function loadData() {
            const saved = localStorage.getItem('smartfdiet_glicemia_v2');
            if (saved) {
                misurazioni = JSON.parse(saved);
                // Ordina dalla più recente alla più vecchia
                misurazioni.sort((a, b) => b.timestamp - a.timestamp);
            } else {
                misurazioni = [];
            }
            renderLista();
        }

        function saveData() {
            localStorage.setItem('smartfdiet_glicemia_v2', JSON.stringify(misurazioni));
            loadData();
        }

        // --- SALVATAGGIO NUOVA MISURAZIONE ---
        window.salvaGlicemia = function() {
            const tipoSelezionato = document.getElementById('glicemia-tipo').value;
            const valoreInput = document.getElementById('glicemia-valore').value;
            const valore = parseInt(valoreInput);

            if (!valoreInput || isNaN(valore)) {
                showModal("Errore", "Inserisci un valore numerico valido.", "error");
                return;
            }

            const isDigiuno = tipoSelezionato === 'digiuno';
            const limite = isDigiuno ? 150 : 180;
            const isBuono = valore < limite;

            const nuovaMisurazione = {
                id: Date.now().toString(),
                tipo: isDigiuno ? "A Digiuno" : "Post-Prandiale",
                valore: valore,
                isBuono: isBuono,
                limite: limite,
                timestamp: Date.now()
            };

            misurazioni.push(nuovaMisurazione);
            saveData();
            
            document.getElementById('glicemia-valore').value = ''; // Reset input
            document.getElementById('glicemia-valore').blur(); // Nasconde tastiera mobile
        };

        // --- RENDERIZZAZIONE LISTA ---
        function renderLista() {
            const listContainer = document.getElementById('lista-glicemia');
            
            if (misurazioni.length === 0) {
                listContainer.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 mt-10 opacity-60">
                        <i class="fa-solid fa-clipboard-list text-5xl mb-4"></i>
                        <p class="font-medium">Nessuna misurazione salvata.</p>
                        <p class="text-sm mt-1">Inizia registrando il tuo primo valore.</p>
                    </div>`;
                return;
            }

            listContainer.innerHTML = '';
            
            misurazioni.forEach(m => {
                const dataObj = new Date(m.timestamp);
                // Formatta in "Giorno/Mese Ore:Minuti"
                const dataStr = `${dataObj.getDate().toString().padStart(2,'0')}/${(dataObj.getMonth()+1).toString().padStart(2,'0')} - ${dataObj.getHours().toString().padStart(2,'0')}:${dataObj.getMinutes().toString().padStart(2,'0')}`;
                
                const bgClass = m.isBuono ? "bg-emerald-50 border-emerald-100" : "bg-red-50 border-red-200";
                const textClass = m.isBuono ? "text-emerald-700" : "text-red-700";
                const iconClass = m.isBuono ? "fa-circle-check text-emerald-500" : "fa-triangle-exclamation text-red-500";
                const badgeBg = m.isBuono ? "bg-emerald-100 text-emerald-800" : "bg-red-200 text-red-900";

                const html = `
                    <div class="flex items-center justify-between p-4 rounded-2xl border ${bgClass} transition-all relative overflow-hidden group">
                        
                        <div class="flex flex-col z-10">
                            <span class="text-[10px] font-black uppercase tracking-wider text-slate-400 mb-1">${dataStr}</span>
                            <div class="font-bold text-slate-800 flex items-center gap-2">
                                ${m.tipo}
                            </div>
                            <span class="text-[11px] font-semibold mt-1 px-2 py-0.5 rounded-md w-max ${badgeBg}">Limite: ${m.limite}</span>
                        </div>

                        <div class="flex items-center gap-4 z-10">
                            <div class="text-right">
                                <div class="text-3xl font-black tracking-tight ${textClass}">${m.valore}</div>
                                <div class="text-xs font-bold opacity-80 ${textClass}"><i class="fa-solid ${iconClass}"></i> mg/dL</div>
                            </div>
                            <button onclick="eliminaMisurazione('${m.id}')" class="w-10 h-10 rounded-full bg-white/60 text-slate-400 hover:bg-red-500 hover:text-white flex items-center justify-center transition-colors shadow-sm">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', html);
            });
        }

        // --- ELIMINAZIONE SINGOLA ---
        window.eliminaMisurazione = function(id) {
            showModal("Elimina", "Sei sicuro di voler eliminare questa misurazione?", "warning", () => {
                misurazioni = misurazioni.filter(m => m.id !== id);
                saveData();
                closeModal();
            });
        };

        // --- SVUOTA TUTTO ---
        window.svuotaDiario = function() {
            if(misurazioni.length === 0) return;
            showModal("Svuota Diario", "Attenzione: stai per eliminare TUTTE le misurazioni salvate. L'azione è irreversibile. Procedere?", "danger", () => {
                misurazioni = [];
                saveData();
                closeModal();
            });
        };

        // --- SISTEMA MODALI (Finestre di avviso) ---
        window.showModal = function(title, message, type = "info", confirmCallback = null) {
            const modal = document.getElementById('custom-modal');
            const icon = document.getElementById('modal-icon');
            const btnPrimary = document.getElementById('modal-btn-primary');
            const actionsContainer = document.getElementById('modal-actions');

            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;

            // Reset bottoni
            actionsContainer.innerHTML = '';

            if (type === "error") {
                icon.className = "mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 text-red-500 mb-4 text-3xl";
                icon.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                actionsContainer.innerHTML = `<button onclick="closeModal()" class="flex-1 bg-slate-800 text-white font-bold py-3 rounded-xl">Ho capito</button>`;
            } 
            else if (type === "warning" || type === "danger") {
                icon.className = "mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-amber-100 text-amber-500 mb-4 text-3xl";
                icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
                
                const cancelBtn = document.createElement('button');
                cancelBtn.className = "flex-1 bg-slate-100 text-slate-700 font-bold py-3 rounded-xl hover:bg-slate-200 transition-colors";
                cancelBtn.innerText = "Annulla";
                cancelBtn.onclick = closeModal;

                const confirmBtn = document.createElement('button');
                confirmBtn.className = "flex-1 bg-red-500 text-white font-bold py-3 rounded-xl hover:bg-red-600 transition-colors";
                confirmBtn.innerText = "Sì, procedi";
                confirmBtn.onclick = confirmCallback;

                actionsContainer.appendChild(cancelBtn);
                actionsContainer.appendChild(confirmBtn);
            } 
            else {
                icon.className = "mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-medical-50 text-medical-500 mb-4 text-3xl";
                icon.innerHTML = '<i class="fa-solid fa-info"></i>';
                actionsContainer.innerHTML = `<button onclick="closeModal()" class="flex-1 medical-gradient text-white font-bold py-3 rounded-xl">Ok</button>`;
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('modal-content').classList.remove('scale-95');
            }, 10);
        };

        window.closeModal = function() {
            const modal = document.getElementById('custom-modal');
            modal.classList.add('opacity-0');
            document.getElementById('modal-content').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        };

        // Permette di premere "Invio" nel campo PIN
        document.getElementById('pin-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPin();
            }
        });

    </script>
</body>
</html>
