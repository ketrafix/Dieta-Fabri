<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartFDiet</title>
    <!-- Logo che punta al file logo.png che caricherai -->
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22SmartFDiet%22%2C%22short_name%22%3A%22SmartFDiet%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f0fdf4%22%2C%22theme_color%22%3A%22%2316a34a%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22logo.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: #ffffff; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border: 2px solid #e2e8f0; border-radius: 1.5rem; }
        .medical-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .tab-btn.active { background-color: #16a34a; color: #ffffff; font-weight: 800; border: 2px solid #15803d; }
        .tab-btn.inactive { background-color: #334155; color: #94a3b8; font-weight: 600; }
        .select-icon { background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1.2em; }
    </style>
</head>
<body class="min-h-screen text-slate-800 bg-slate-900">

    <!-- Schermata Login -->
    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-[320px] bg-white rounded-[2rem] p-8 text-center shadow-2xl">
            <img src="logo.png" alt="Logo" class="w-20 h-20 mx-auto mb-5 rounded-2xl">
            <h1 class="text-2xl font-bold text-slate-800 mb-1">SmartFDiet</h1>
            <input type="password" id="pin-input" placeholder="C O D I C E   P I N" inputmode="numeric" class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-5 py-4 text-center text-lg font-bold tracking-[0.2em] focus:ring-2 focus:ring-green-500 my-4">
            <button onclick="checkPin()" class="w-full bg-[#16a34a] text-white font-bold py-3.5 rounded-xl">Accedi</button>
            <p id="pin-error" class="text-red-500 text-sm font-bold mt-4 hidden">PIN Errato</p>
        </div>
    </div>

    <!-- App Content (Script rimane identico) -->
    <div id="app-content" class="hidden flex-col min-h-screen bg-slate-100">
        <header class="medical-gradient shadow-xl sticky top-0 z-40 border-b-4 border-slate-800">
            <div class="max-w-7xl mx-auto px-4 pt-4 pb-4">
                <div class="flex items-center justify-between mb-4 text-white">
                    <div class="flex items-center gap-3">
                        <img src="logo.png" alt="Logo" class="w-10 h-10 rounded-xl">
                        <h1 class="text-2xl font-black">SmartFDiet</h1>
                    </div>
                    <button onclick="logout()" class="text-slate-300 bg-white/10 px-4 py-2 rounded-lg text-sm font-bold">Log out</button>
                </div>
                <div class="flex gap-2 p-1.5 bg-slate-900 rounded-xl border border-slate-700">
                    <button onclick="switchTab('dieta')" id="tab-dieta" class="tab-btn active flex-1 py-3 px-4 rounded-lg text-sm">Menù Dieta</button>
                    <button onclick="switchTab('glicemia')" id="tab-glicemia" class="tab-btn inactive flex-1 py-3 px-4 rounded-lg text-sm">Glicemia</button>
                </div>
            </div>
        </header>
        <main class="max-w-7xl mx-auto w-full px-4 mt-8 flex-grow flex flex-col pb-12">
            <!-- (Contenuto dieta e glicemia invariato) -->
            <!-- NOTA: Inserire qui il resto del codice dieta/glicemia precedente -->
        </main>
    </div>
    <script>
        /* (Tutti gli script di logica precedenti) */
    </script>
</body>
</html>
